<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style2.css">
        <title>SvS | Projects</title>
        <link rel="icon" type="image/x-icon" href="css/Images/heliocentrism.jpg">
    </head>

    <body class="projectPageBody" data-page="projects">
        <div class="projectPendulum" aria-hidden="true"></div>

        <main class="projectWorkshop">
            <nav class="projectTopLinks" aria-label="Projects navigation">
                <a class="satelliteText projectHomeLink" href="index.html" data-rainbow="space">Return to Homebase</a>
                <div class="projectNavCluster">
                    <a class="outwardLink" href="journal.html">Journal</a>
                    <a class="outwardLink" href="index.html#cv">CV</a>
                    <a class="outwardLink" href="index.html#scrapbook">Scrapbook</a>
                </div>
            </nav>

            <header class="projectWorkshopHero">
                <div class="projectHeroCopy">
                    <h1 data-rainbow="space">Project Workshop</h1>
                    <p>Stuff that's been tinkered or needs tinkering.</p>
                </div>

                <div class="projectMachine" aria-hidden="true">
                    <div class="projectGauge">
                        <img src="css/Images/cogs.gif" alt="">
                    </div>
                    <div class="projectCog projectCog--large">
                        <img src="css/Images/cogs.gif" alt="">
                    </div>
                    <div class="projectCog projectCog--small">
                        <img src="css/Images/cogs.gif" alt="">
                    </div>
                </div>
            </header>

            <section class="projectBlueprintShelf" aria-label="Project entries">
                <div class="projectShelfHeader">
                    <h2>Look on works ye mighty and despair</h2>
                </div>
                <div id="projectEntries" class="projectEntries"></div>
            </section>
        </main>

        <template id="projectEntryTemplate">
            <article class="projectEntry">
                <div class="projectEntryPlate">
                    <span class="projectEntryNumber"></span>
                    <span class="projectEntryDate"></span>
                </div>
                <h2 class="projectEntryTitle"></h2>
                <div class="projectEntryBody"></div>
                <footer class="projectEntryFooter">
                    <span class="projectEntryDivider">BRASSWORKS</span>
                    <span class="projectEntryStamp">In progress</span>
                </footer>
            </article>
        </template>

        <script src="js/rainbow.js"></script>
        <script src="js/project.js"></script>
    </body>
</html>
