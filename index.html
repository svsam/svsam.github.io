<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/page-transition.css">
        <title>SvS Homepage</title>
        <link rel="icon" type="image/x-icon" href="css/Images/Luigi.jpg">
        <style>
            html, body {
                height: 100%;
                min-height: 100vh;
            }

            body {
                min-height: 100vh;
                overflow: hidden;
                background-image: url("css/Images/background.gif");
                background-repeat: no-repeat;
                background-size: cover;
                background-position: center;
            }

            .homeShell {
                box-sizing: border-box;
                width: 100vw;
                min-height: 100vh;
                margin: 0;
                padding: 28px 32px;
                border: 5px double rgba(125, 18, 255, 0.5);
                outline: 1px solid rgb(125, 18, 255);
                background: rgba(0, 0, 0, 0.55);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                font-size: 16px;
            }

            .homeShell h1 {
                margin: 0;
                font-size: 56px;
                line-height: 1.05;
            }

            .homeShell p {
                margin: 10px 0 24px;
                color: whitesmoke;
                font-size: 18px;
            }

            .homeLinks {
                display: flex;
                justify-content: center;
                gap: 14px;
                flex-wrap: wrap;
            }

            .homeLinks a {
                padding: 10px 18px;
                border: 1px solid rgba(125, 18, 255, 0.45);
                color: whitesmoke;
                text-decoration: none;
                background: rgba(125, 18, 255, 0.1);
                font-size: 16px;
            }

            .homeLinks a:hover {
                color: rgb(255, 95, 31);
                background: rgba(125, 18, 255, 0.18);
            }
        </style>
    </head>

    <body>
        <div class="homeShell">
            <h1 id="rainbow" style="color: rgb(255, 95, 31);">SamvS</h1>
            <p>Homepage</p>
            <div class="homeLinks">
                <a href="journal.html">Open Journal</a>
                <a href="cv.html">Open CV</a>
            </div>
        </div>

        <script src="js/rainbow.js"></script>
        <script src="js/page-transition.js"></script>
    </body>
</html>
