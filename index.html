<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style2.css">
        <link rel="stylesheet" href="css/page-transition.css">
        <title>SvS</title>
        <link rel="icon" type="image/x-icon" href="css/Images/heliocentrism.jpg">
    </head>

    <body data-page="home">
        <main class="satelliteContent" data-active-page="home">
            <p class="homeClock" role="timer" aria-live="off" aria-atomic="true">
                My current time is: <time id="ukClock" datetime="">Loading...</time>!
            </p>
            <img class="satelliteImage" src="css/Images/satellite image.jpg" alt="Satellite image">
            <a class="satelliteText" href="./" data-page-link="home" data-rainbow="space">Welcome to - Homebase</a>
            <nav class="outwardLinks" aria-label="Outward links">
                <a class="outwardLink" href="journal/">Journal</a>
                <a class="outwardLink" href="projects/">Projects</a>
                <a class="outwardLink" href="#checklist" data-page-link="cv">Checklist</a>
                <a class="outwardLink" href="#scrapbook" data-page-link="scrapbook" style="border-style: hidden;">Scrapbook</a>
            </nav>

            <section class="pageView pageView--home is-active" data-page="home" aria-label="Home"></section>

            <section class="pageView" data-page="checklist" hidden>
                <div class="pageShell">
                    <h1>Checklist</h1>
                    <p>Under construction</p>
                </div>
            </section>

            <section class="pageView" data-page="scrapbook" hidden>
                <div class="pageShell">
                    <h1>Scrapbook</h1>
                    <p>Under construction</p>
                </div>
            </section>
        </main>

        <img src="css/Images/Animated-Flag-United-Kingdom.gif" alt="Union Jack" style="position: fixed; bottom: 10px; right: 10px; width: 500px; height: auto; z-index: 1000; opacity: 0.1;">
        <img src="css/Images/blinkiesCafe-ic.gif" alt="Blinkies Cafe" style="position: fixed; bottom: 10px; left: 10px; width: 300px; height: auto; z-index: 1000; opacity: 0.8;">
        <img src="css/Images/icon1.gif" alt="turning satellite disk" style="position: fixed; bottom: 40px; left: 10px; width: 250px; height: auto; z-index: 1000; opacity: 0.8;">

        <script src="js/rainbow.js"></script>
        <script src="js/uk-clock.js"></script>
        <script src="js/page-transition.js"></script>
    </body>
</html>
